# LAIRM MCP Server Configuration
# Configuration pour le serveur MCP LAIRM

server:
  name: "LAIRM MCP Server"
  version: "1.0.0"
  description: "Model Context Protocol server for LAIRM framework"
  
  # Port et host
  host: "localhost"
  port: 8000
  
  # Authentification
  auth:
    enabled: true
    type: "certificate"
    certificate_path: "/path/to/cert.pem"
    key_path: "/path/to/key.pem"

# Framework LAIRM
framework:
  root_path: "LAIRM"
  
  # Sections
  sections:
    - name: "metadata"
      path: "00-METADATA"
      enabled: true
    
    - name: "reference"
      path: "01-COMPENDIUM-REFERENCE"
      enabled: true
    
    - name: "legislative"
      path: "02-COMPENDIUM-LEGISLATIF"
      enabled: true
    
    - name: "technical"
      path: "03-ANNEXES-TECHNIQUES"
      enabled: true
    
    - name: "reports"
      path: "04-RAPPORTS-ANALYSES"
      enabled: true

# Ressources MCP
resources:
  articles:
    enabled: true
    cache: true
    cache_ttl: 3600
  
  axiomes:
    enabled: true
    cache: true
    cache_ttl: 3600
  
  compliance:
    enabled: true
    cache: false
  
  audit:
    enabled: true
    cache: false

# Outils MCP
tools:
  search_articles:
    enabled: true
    description: "Search articles in LAIRM framework"
    parameters:
      - name: "query"
        type: "string"
        required: false
      - name: "axiome"
        type: "string"
        required: false
      - name: "statut"
        type: "string"
        required: false
  
  get_article:
    enabled: true
    description: "Get a specific article"
    parameters:
      - name: "numero"
        type: "string"
        required: true
  
  get_axiome:
    enabled: true
    description: "Get a specific axiome"
    parameters:
      - name: "axiome_name"
        type: "string"
        required: true
  
  validate_compliance:
    enabled: true
    description: "Validate agent compliance"
    parameters:
      - name: "agent_config"
        type: "object"
        required: true
  
  audit_action:
    enabled: true
    description: "Audit an agent action"
    parameters:
      - name: "agent_id"
        type: "string"
        required: true
      - name: "action"
        type: "object"
        required: true

# Logging
logging:
  level: "INFO"
  format: "json"
  file: "logs/mcp-server.log"
  max_size: "100MB"
  max_backups: 10

# Performance
performance:
  max_connections: 100
  request_timeout: 30
  cache_enabled: true
  cache_size: "100MB"

# Security
security:
  tls_enabled: true
  tls_version: "1.3"
  allowed_origins:
    - "localhost"
    - "127.0.0.1"
  rate_limit:
    enabled: true
    requests_per_minute: 100
