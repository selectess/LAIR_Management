<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAIRM - The Cybernetic Criterion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f5f0e8;
            color: #1a1a1a;
            min-height: 100vh;
        }
        
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .logo {
            width: 160px;
            height: 160px;
            margin-bottom: 2rem;
        }
        
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 600;
            color: #8b7355;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: clamp(1.125rem, 2.5vw, 1.5rem);
            color: #c9a962;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        
        .description {
            font-size: 1rem;
            color: #4a4a4a;
            text-align: center;
            max-width: 500px;
            margin-bottom: 0.5rem;
        }
        
        .highlight {
            color: #8b7355;
            font-weight: 500;
        }
        
        .stats {
            display: flex;
            gap: 2.5rem;
            margin: 2rem 0;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-number {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
            font-weight: 600;
            color: #8b7355;
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #6b6b6b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.25rem;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        @media (min-width: 480px) {
            .buttons {
                flex-direction: row;
                gap: 1rem;
            }
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            font-size: 0.9375rem;
            font-weight: 500;
            text-decoration: none;
            border-radius: 2px;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: #8b7355;
            color: #f5f0e8;
        }
        
        .btn-primary:hover {
            background: #6b5a45;
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid #8b7355;
            color: #8b7355;
        }
        
        .btn-secondary:hover {
            background: #8b7355;
            color: #f5f0e8;
        }
        
        .footer {
            margin-top: 3rem;
            text-align: center;
            color: #6b6b6b;
            font-size: 0.8125rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Logo.png" alt="LAIRM Logo" class="logo">
        
        <h1>LAIRM</h1>
        <p class="subtitle">The Cybernetic Criterion</p>
        <p class="description">
            Legislature for Autonomous Intelligent Resources Management<br>
            <span class="highlight">Global Agentive Constitution 2026–2036</span>
        </p>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number">19</div>
                <div class="stat-label">Axioms</div>
            </div>
            <div class="stat">
                <div class="stat-number">361</div>
                <div class="stat-label">Articles</div>
            </div>
            <div class="stat">
                <div class="stat-number">28</div>
                <div class="stat-label">Chapters</div>
            </div>
        </div>
        
        <div class="buttons">
            <a href="https://selectess.github.io/LAIR_Management/manifesto/" class="btn btn-primary">
                Read the Manifesto
            </a>
            <a href="https://lairm-platform.vercel.app" class="btn btn-secondary">
                Enter Platform
            </a>
        </div>
        
        <div class="footer">
            LAIRM — The Cybernetic Criterion
        </div>
    </div>
</body>
</html>
