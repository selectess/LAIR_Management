<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAIRM Manifesto - Select Language</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 1.25rem;
        }
        
        .languages {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .lang-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 1rem;
            padding: 2rem;
            text-decoration: none;
            color: white;
            transition: all 0.3s;
            text-align: center;
        }
        
        .lang-card:hover {
            background: rgba(6, 182, 212, 0.1);
            border-color: #06b6d4;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
        }
        
        .lang-flag {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        
        .lang-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .lang-native {
            color: #94a3b8;
            font-size: 0.875rem;
        }
        
        .back-link {
            text-align: center;
        }
        
        .back-link a {
            color: #06b6d4;
            text-decoration: none;
            font-size: 1rem;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Select Your Language</h1>
            <p class="subtitle">Sélectionnez votre langue • Seleccione su idioma</p>
        </header>
        
        <div class="languages">
            <a href="en/" class="lang-card">
                <div class="lang-flag">🇬🇧</div>
                <div class="lang-name">English</div>
                <div class="lang-native">English</div>
            </a>
            
            <a href="fr/" class="lang-card">
                <div class="lang-flag">🇫🇷</div>
                <div class="lang-name">French</div>
                <div class="lang-native">Français</div>
            </a>
            
            <a href="es/" class="lang-card">
                <div class="lang-flag">🇪🇸</div>
                <div class="lang-name">Spanish</div>
                <div class="lang-native">Español</div>
            </a>
            
            <a href="de/" class="lang-card">
                <div class="lang-flag">🇩🇪</div>
                <div class="lang-name">German</div>
                <div class="lang-native">Deutsch</div>
            </a>
            
            <a href="zh/" class="lang-card">
                <div class="lang-flag">🇨🇳</div>
                <div class="lang-name">Chinese</div>
                <div class="lang-native">中文</div>
            </a>
            
            <a href="ar/" class="lang-card">
                <div class="lang-flag">🇸🇦</div>
                <div class="lang-name">Arabic</div>
                <div class="lang-native">العربية</div>
            </a>
            
            <a href="ru/" class="lang-card">
                <div class="lang-flag">🇷🇺</div>
                <div class="lang-name">Russian</div>
                <div class="lang-native">Русский</div>
            </a>
            
            <a href="pt/" class="lang-card">
                <div class="lang-flag">🇵🇹</div>
                <div class="lang-name">Portuguese</div>
                <div class="lang-native">Português</div>
            </a>
            
            <a href="ja/" class="lang-card">
                <div class="lang-flag">🇯🇵</div>
                <div class="lang-name">Japanese</div>
                <div class="lang-native">日本語</div>
            </a>
            
            <a href="hi/" class="lang-card">
                <div class="lang-flag">🇮🇳</div>
                <div class="lang-name">Hindi</div>
                <div class="lang-native">हिन्दी</div>
            </a>
            
            <a href="it/" class="lang-card">
                <div class="lang-flag">🇮🇹</div>
                <div class="lang-name">Italian</div>
                <div class="lang-native">Italiano</div>
            </a>
        </div>
        
        <div class="back-link">
            <a href="../">← Back to Home</a>
        </div>
    </div>
</body>
</html>
